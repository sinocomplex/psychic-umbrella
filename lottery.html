<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f2f2f7" media="(max-width: 540px)">
<meta name="theme-color" content="#0b0b0c" media="(min-width: 541px)">
<title>摇号机 · 彩票生成器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   设计系统
   PC：苹果级暗色  /  手机：同色系浅色
   ═══════════════════════════════════════════════ */
:root {
  /* 背景层级 */
  --bg:      #0b0b0c;
  --surface: #121214;
  --panel:   #18181b;

  /* 边框 */
  --border:  #2a2a2e;
  --divider: #2f2f33;

  /* 文字 */
  --text:           #f5f5f7;
  --text-secondary: #c7c7cc;
  --muted:          #8e8e93;

  /* 强调色 */
  --accent:      #ff7a1a;
  --accent-soft: #ff9a3c;

  /* 成功 */
  --green: #32d74b;

  /* 字体 */
  --sans: -apple-system, BlinkMacSystemFont, "Inter", "SF Pro Text", "Noto Sans SC", sans-serif;
  --mono: "JetBrains Mono", "SF Mono", "Share Tech Mono", monospace;

  /* 球 — PC 三段渐变 + 双层光晕 */
  --ball-size:   50px;
  --ball-font:   18px;
  --ball-weight: 700;

  --ball-red-bg:     radial-gradient(circle at 35% 32%, rgba(255,160,140,0.85), #e03020 55%, #8b0e0e);
  --ball-red-border: rgba(230,100,80,0.4);
  --ball-red-glow:   rgba(220,50,30,0.5) 0 0 14px, rgba(220,50,30,0.2) 0 0 32px;

  --ball-blue-bg:     radial-gradient(circle at 35% 32%, rgba(140,195,255,0.85), #1a6fd4 55%, #0a2e7a);
  --ball-blue-border: rgba(100,170,255,0.4);
  --ball-blue-glow:   rgba(30,100,220,0.5) 0 0 14px, rgba(30,100,220,0.2) 0 0 32px;

  --ball-org-bg:     radial-gradient(circle at 35% 32%, rgba(255,200,120,0.85), #d95f00 55%, #7a2800);
  --ball-org-border: rgba(255,150,60,0.4);
  --ball-org-glow:   rgba(220,100,0,0.5) 0 0 14px, rgba(220,100,0,0.2) 0 0 32px;

  --ball-grn-bg:     radial-gradient(circle at 35% 32%, rgba(130,240,170,0.85), #1a9e4a 55%, #0a4a20);
  --ball-grn-border: rgba(80,210,120,0.4);
  --ball-grn-glow:   rgba(20,160,70,0.5) 0 0 14px, rgba(20,160,70,0.2) 0 0 32px;
}

/* ── 手机：浅色主题覆盖 ── */
@media (max-width: 540px) {
  :root {
    --bg:             #f2f2f7;
    --surface:        #ffffff;
    --panel:          #f7f7f8;
    --border:         #d8d8dc;
    --divider:        #e0e0e5;
    --text:           #1c1c1e;
    --text-secondary: #3a3a3c;
    --muted:          #8e8e93;
    --accent:         #e05800;
    --accent-soft:    #ff7a20;
    --green:          #1a9e4a;

    /* 球 — 手机哑光纯色，clamp 防极小屏溢出 */
    --ball-size:   clamp(30px, 8.5vw, 36px);
    --ball-font:   clamp(12px, 3.5vw, 14px);

    --ball-red-bg:     #d93025;
    --ball-red-border: transparent;
    --ball-red-glow:   none;

    --ball-blue-bg:     #1a6fd4;
    --ball-blue-border: transparent;
    --ball-blue-glow:   none;

    --ball-org-bg:     #d95f00;
    --ball-org-border: transparent;
    --ball-org-glow:   none;

    --ball-grn-bg:     #1a8c3e;
    --ball-grn-border: transparent;
    --ball-grn-glow:   none;
  }
}

/* ═══════════════════════════════════════════════
   Reset & Base
   ═══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 500;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 48px 20px 64px;
  position: relative;
  overflow-x: hidden;
}

/* grain + scanlines：仅 PC 暗色下渲染 */
@media (min-width: 541px) {
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.5;
  }
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
  }
}

.container {
  position: relative; z-index: 1;
  width: 100%; max-width: 720px;
}

/* ═══════════════════════════════════════════════
   Header
   ═══════════════════════════════════════════════ */
.header { text-align: center; margin-bottom: 32px; }

.header-badge {
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--muted);
  margin-bottom: 10px;
}

.header h1 {
  font-size: clamp(28px, 6vw, 42px);
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1.1;
}
.header h1 span { color: var(--accent); }

.header-sub {
  margin-top: 8px;
  font-size: 14px;
  color: var(--text-secondary);
}

/* ═══════════════════════════════════════════════
   Machine 主面板
   ═══════════════════════════════════════════════ */
.machine {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  box-shadow:
    0 12px 36px rgba(0,0,0,0.45),
    inset 0 1px 0 rgba(255,255,255,0.05);
}

/* ── 顶部控制 ── */
.machine-top {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
  padding: 16px 20px;
  border-bottom: 1px solid var(--divider);
}

.control-group { display: flex; align-items: center; gap: 10px; }

.ctrl-label {
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
}

/* 玩法切换 */
.game-toggle {
  display: flex;
  border-radius: 8px;
  overflow: hidden;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
}
.game-toggle button {
  font-size: 13px;
  padding: 7px 16px;
  background: transparent;
  color: var(--text-secondary);
  border: none;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.game-toggle button.active { background: var(--accent); color: #fff; }
.game-toggle button:not(.active):hover { background: rgba(255,255,255,0.06); color: var(--text); }

/* 步进器 */
.stepper {
  display: flex;
  align-items: center;
  border-radius: 8px;
  overflow: hidden;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
}
.stepper button {
  width: 34px; height: 34px;
  background: transparent;
  border: none;
  color: var(--text-secondary);
  font-size: 18px; line-height: 1;
  cursor: pointer;
  transition: color 0.15s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.stepper button:hover { color: var(--accent); background: rgba(255,255,255,0.06); }
.stepper-val {
  width: 38px;
  text-align: center;
  font-size: 14px;
  color: var(--text);
  user-select: none;
}

/* 摇号按钮 */
.btn-generate {
  margin-left: auto;
  padding: 10px 26px;
  border-radius: 10px;
  border: none;
  font-size: 13px;
  font-weight: 600;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  transition: background 0.15s, transform 0.08s;
  -webkit-tap-highlight-color: transparent;
}
.btn-generate:hover   { background: var(--accent-soft); }
.btn-generate:active  { transform: scale(0.97); }
.btn-generate:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ── 手机覆盖 ── */
@media (max-width: 540px) {
  body { padding: 28px 12px 48px; }
  .header { margin-bottom: 24px; }

  .machine-top { padding: 14px 16px; gap: 10px; }
  .btn-generate {
    width: 100%; margin-left: 0;
    padding: 13px 0;
    font-size: 15px;
    border-radius: 10px;
  }
  .game-toggle button { font-size: 13px; padding: 9px 20px; }
  .stepper button { width: 38px; height: 38px; font-size: 22px; }
  .stepper-val { font-size: 16px; width: 42px; }
}

/* ═══════════════════════════════════════════════
   Screen
   ═══════════════════════════════════════════════ */
.machine-screen { position: relative; min-height: 220px; }

.screen-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  border-bottom: 1px solid var(--divider);
}
.screen-title { font-size: 13px; color: var(--text-secondary); }

.screen-actions { display: flex; gap: 8px; }
.btn-sm {
  font-size: 13px;
  padding: 4px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-sm:hover { background: rgba(255,255,255,0.06); color: var(--text); }

@media (max-width: 540px) {
  .screen-header { padding: 10px 16px; }
  .btn-sm { font-size: 13px; padding: 6px 14px; }
}

/* ═══════════════════════════════════════════════
   Results
   ═══════════════════════════════════════════════ */
.results-list {
  padding: 16px;
  display: flex; flex-direction: column; gap: 10px;
  max-height: 600px; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.results-list::-webkit-scrollbar { width: 3px; }
.results-list::-webkit-scrollbar-thumb { background: var(--border); }

@media (max-width: 540px) {
  .results-list { padding: 12px; gap: 6px; max-height: none; }
}

/* 空状态 */
.empty-state { padding: 60px 24px; text-align: center; }
.empty-icon  { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }
.empty-text  { font-size: 14px; color: var(--text-secondary); }

/* 结果行 */
.result-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  opacity: 0; transform: translateY(5px);
  animation: rowIn 0.22s ease forwards;
}
@keyframes rowIn { to { opacity: 1; transform: translateY(0); } }

/* 手机竖排 */
@media (max-width: 540px) {
  .result-row { flex-direction: column; align-items: flex-start; gap: 8px; padding: 12px 14px; }
  .row-top    { display: flex; align-items: center; gap: 8px; width: 100%; }
  .divider    { width: 100% !important; height: 1px !important; }
}

.row-idx {
  font-family: var(--mono);
  font-size: 11px; color: var(--muted);
  width: 28px; flex-shrink: 0;
}
@media (max-width: 540px) { .row-idx { font-size: 12px; } }

.row-section { display: flex; align-items: center; gap: 8px; max-width: 100%; }

.section-tag {
  font-size: 11px; color: var(--muted);
  width: 20px; flex-shrink: 0;
}
@media (max-width: 540px) { .section-tag { font-size: 12px; width: 22px; } }

.balls { display: flex; gap: 8px; flex-wrap: nowrap; }
@media (max-width: 540px) {
  .balls { overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
  .balls::-webkit-scrollbar { display: none; }
}

.divider { width: 1px; height: 22px; background: var(--divider); flex-shrink: 0; }

/* ═══════════════════════════════════════════════
   球
   ═══════════════════════════════════════════════ */
.ball {
  width: var(--ball-size); height: var(--ball-size);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Oswald', var(--mono);
  font-size: var(--ball-font);
  font-weight: var(--ball-weight, 700);
  color: #fff;
  flex-shrink: 0;
  cursor: default;
  position: relative;
  animation: ballPop 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
  transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s ease;
}
.ball:hover { transform: scale(1.12); }

@keyframes ballPop {
  from { transform: scale(0.35); opacity: 0; }
  to   { transform: scale(1);    opacity: 1; }
}

/* 顶部高光伪元素 */
.ball::before {
  content: ''; position: absolute;
  top: 13%; left: 17%; width: 38%; height: 22%;
  background: rgba(255,255,255,0.28);
  border-radius: 50%; filter: blur(2px);
  pointer-events: none;
}

.ball-red    { background: var(--ball-red-bg);  border: 1.5px solid var(--ball-red-border);  box-shadow: var(--ball-red-glow); }
.ball-blue   { background: var(--ball-blue-bg); border: 1.5px solid var(--ball-blue-border); box-shadow: var(--ball-blue-glow); }
.ball-orange { background: var(--ball-org-bg);  border: 1.5px solid var(--ball-org-border);  box-shadow: var(--ball-org-glow); }
.ball-green  { background: var(--ball-grn-bg);  border: 1.5px solid var(--ball-grn-border);  box-shadow: var(--ball-grn-glow); }

/* 手机：哑光，无光晕，无高光伪元素 */
@media (max-width: 540px) {
  .ball { transition: none; }
  .ball:hover  { transform: none; }
  .ball::before { display: none; }
  .ball-red    { border: none; box-shadow: none; }
  .ball-blue   { border: none; box-shadow: none; }
  .ball-orange { border: none; box-shadow: none; }
  .ball-green  { border: none; box-shadow: none; }
}

/* ═══════════════════════════════════════════════
   Status bar
   ═══════════════════════════════════════════════ */
.statusbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 20px;
  border-top: 1px solid var(--divider);
}
.status-text { font-size: 12px; color: var(--text-secondary); }
.status-dot  {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--muted); transition: background 0.3s;
}
.status-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }

@media (max-width: 540px) { .statusbar { padding: 8px 16px; } }

/* ═══════════════════════════════════════════════
   Rolling overlay
   ═══════════════════════════════════════════════ */
.rolling-overlay {
  position: absolute; inset: 0;
  background: color-mix(in srgb, var(--surface) 82%, transparent);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center;
  z-index: 10;
}
.rolling-overlay.show { display: flex; }

.roller-text {
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  animation: blink 0.5s steps(1) infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* ═══════════════════════════════════════════════
   Footer
   ═══════════════════════════════════════════════ */
.footer {
  margin-top: 20px;
  text-align: center;
  font-size: 13px;
  color: var(--muted);
}
</style>
</head>
<body>
<div class="container">
  <header class="header">
    <div class="header-badge">CRYPTO RANDOM ENGINE</div>
    <h1>摇号<span>机</span></h1>
    <p class="header-sub">基于 crypto.getRandomValues · 密码学级随机</p>
  </header>

  <div class="machine">
    <div class="machine-top">
      <div class="control-group">
        <span class="ctrl-label">玩法</span>
        <div class="game-toggle">
          <button data-game="ssq" class="active">双色球</button>
          <button data-game="dlt">大乐透</button>
        </div>
      </div>
      <div class="control-group">
        <span class="ctrl-label">注数</span>
        <div class="stepper">
          <button data-delta="-1" aria-label="减少注数">−</button>
          <div class="stepper-val">5</div>
          <button data-delta="1" aria-label="增加注数">+</button>
        </div>
      </div>
      <button class="btn-generate">▶ 摇号 (Enter)</button>
    </div>

    <div class="machine-screen">
      <div class="rolling-overlay" id="rolling">
        <span class="roller-text">ROLLING</span>
      </div>
      <div class="screen-header">
        <span class="screen-title" id="screen-title">等待摇号</span>
        <div class="screen-actions">
          <button class="btn-sm" data-action="copy">复制</button>
          <button class="btn-sm" data-action="clear">清空</button>
        </div>
      </div>
      <div class="results-list" id="results">
        <div class="empty-state">
          <div class="empty-icon">⟳</div>
          <div class="empty-text">按下摇号开始</div>
        </div>
      </div>
    </div>

    <div class="statusbar" aria-live="polite">
      <span class="status-text" id="status-text">READY</span>
      <div class="status-dot" id="status-dot"></div>
    </div>
  </div>

  <p class="footer">每注中奖概率均等 · 仅供娱乐</p>
</div>

<script>
const GAMES = {
  ssq: {
    name: '双色球',
    sections: [
      { key: 'red',   label: '红', total: 33, pick: 6, ballClass: 'ball-red'    },
      { key: 'blue',  label: '蓝', total: 16, pick: 1, ballClass: 'ball-blue'   },
    ],
  },
  dlt: {
    name: '大乐透',
    sections: [
      { key: 'front', label: '前', total: 35, pick: 5, ballClass: 'ball-orange' },
      { key: 'back',  label: '后', total: 12, pick: 2, ballClass: 'ball-green'  },
    ],
  },
};

// 配置常量集中管理
const CONFIG = {
  MIN_SETS:  1,
  MAX_SETS:  20,
  ROLL_TIME: 650,
};

// 状态分层：data = 业务数据，ui = 界面状态
const state = {
  data: {
    game:    'ssq',
    sets:    5,
    results: [],
  },
  ui: {
    rolling: false,
  },
};

// 内部实现细节，与业务状态分离
let rollIntervalId = null;

const els = {
  results:     document.getElementById('results'),
  statusText:  document.getElementById('status-text'),
  statusDot:   document.getElementById('status-dot'),
  screenTitle: document.getElementById('screen-title'),
  rolling:     document.getElementById('rolling'),
  setsVal:     document.querySelector('.stepper-val'),
  btnGenerate: document.querySelector('.btn-generate'),
};

// ── 随机（无模偏差）──────────────────────────────────────────
function randBelow(n) {
  const limit = Math.floor(0x100000000 / n) * n;
  const arr = new Uint32Array(1);
  let v;
  do { crypto.getRandomValues(arr); v = arr[0]; } while (v >= limit);
  return v % n;
}

function sample(total, k) {
  const pool = Array.from({ length: total }, (_, i) => i + 1);
  for (let i = total - 1; i >= total - k; i--) {
    const j = randBelow(i + 1);
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool.slice(total - k).sort((a, b) => a - b);
}

function generateTicket(gameKey) {
  const result = {};
  for (const sec of GAMES[gameKey].sections) {
    result[sec.key] = sample(sec.total, sec.pick);
  }
  return result;
}

// ── DOM 构建 ─────────────────────────────────────────────────
function pad(n) { return String(n).padStart(2, '0'); }

function makeBall(n, cls, delay, noAnim = false, total = 35) {
  const el = document.createElement('span');
  el.className = `ball ${cls}`;
  el.textContent = pad(n);
  el.dataset.total = total;   // 记录该球所属区段的最大值，供滚动动画使用
  if (!noAnim) el.style.animationDelay = delay + 'ms';
  return el;
}

const isMobile = () => window.innerWidth <= 540;

function makeRow(index, ticket, gameKey, noAnim = false) {
  const row = document.createElement('div');
  row.className = 'result-row';
  if (!noAnim) row.style.animationDelay = (index * 55) + 'ms';
  
  const mobile = isMobile();

  if (mobile) {
    const top = document.createElement('div');
    top.className = 'row-top';
    const idx = document.createElement('span');
    idx.className = 'row-idx';
    idx.textContent = `#${pad(index + 1)}`;
    top.appendChild(idx);
    row.appendChild(top);
  } else {
    const idx = document.createElement('span');
    idx.className = 'row-idx';
    idx.textContent = pad(index + 1);
    row.appendChild(idx);
  }

  let ballOffset = 0;
  GAMES[gameKey].sections.forEach((sec, si) => {
    if (si > 0) {
      const div = document.createElement('div');
      div.className = 'divider';
      row.appendChild(div);
    }
    const wrap = document.createElement('div');
    wrap.className = 'row-section';

    const tag = document.createElement('span');
    tag.className = 'section-tag';
    tag.textContent = sec.label;
    wrap.appendChild(tag);

    const ballsWrap = document.createElement('div');
    ballsWrap.className = 'balls';
    ticket[sec.key].forEach((n, bi) => {
      ballsWrap.appendChild(makeBall(n, sec.ballClass, (ballOffset + bi) * 38, noAnim, sec.total));
    });
    ballOffset += ticket[sec.key].length;
    wrap.appendChild(ballsWrap);
    row.appendChild(wrap);
  });
  return row;
}

// ── UI 辅助 ───────────────────────────────────────────────────
function setStatus(msg, active = false) {
  els.statusText.textContent = msg;
  els.statusDot.classList.toggle('active', active);
}

function showEmpty() {
  els.results.innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">⟳</div>
      <div class="empty-text">按下摇号开始</div>
    </div>`;
  els.screenTitle.textContent = '等待摇号';
  state.data.results = [];
}

// ── 数据层：只管生成，不碰 DOM ───────────────────────────────

// 生成本次所有注的最终数据，写入 state，返回结果供外部使用
function generateData() {
  const { game, sets } = state.data;
  state.data.results = Array.from({ length: sets }, () => generateTicket(game));
  return state.data.results;
}

// 生成一套占位用的随机假数据（结构与真实数据相同，只是数字随机）
function generatePlaceholderData() {
  const { game, sets } = state.data;
  return Array.from({ length: sets }, () => generateTicket(game));
}

// ── 动画层：只管 DOM 过渡效果，不生成业务数据 ────────────────

// 显示 overlay + 禁用按钮 + 启动球面数字滚动
function animateStart() {
  els.rolling.classList.add('show');
  els.btnGenerate.disabled = true;
  setStatus('ROLLING...', true);

  // 用占位数据撑起球的 DOM 结构（noAnim=true 跳过进场动画）
  const placeholder = generatePlaceholderData();
  render(state.data.game, placeholder, { noAnim: true });

  // 每隔 40ms 按各球自己的范围随机刷新数字
  const balls = els.results.querySelectorAll('.ball');
  rollIntervalId = setInterval(() => {
    balls.forEach(b => {
      const total = parseInt(b.dataset.total, 10);
      b.textContent = pad(Math.floor(Math.random() * total) + 1);
    });
  }, 40);
}

// 停止滚动、隐藏 overlay、恢复按钮
function animateStop() {
  clearInterval(rollIntervalId);
  rollIntervalId = null;
  els.rolling.classList.remove('show');
  els.btnGenerate.disabled = false;
}

// ── 渲染层：只管把数据画到屏幕上 ────────────────────────────

// options: { noAnim = false }
function render(gameKey, results, { noAnim = false } = {}) {
  els.results.innerHTML = '';
  const frag = document.createDocumentFragment();
  results.forEach((ticket, i) => {
    frag.appendChild(makeRow(i, ticket, gameKey, noAnim));
  });
  els.results.appendChild(frag);
  els.results.scrollTop = 0;
  els.screenTitle.textContent = `${GAMES[gameKey].name} · ${results.length} 注`;
}

// ── 控制层：编排数据 / 动画 / 渲染的时序 ────────────────────

function generate() {
  if (state.ui.rolling) return;
  state.ui.rolling = true;

  animateStart();                          // 1. 启动滚动动画

  setTimeout(() => {
    animateStop();                         // 2. 停止动画
    const results = generateData();        // 3. 生成最终数据（写入 state）
    render(state.data.game, results);      // 4. 渲染最终结果（带进场动画）

    const { game, sets } = state.data;
    setStatus(`OK · ${sets} SETS · ${GAMES[game].name}`, true);
    setTimeout(() => setStatus(`READY · LAST: ${GAMES[game].name} ${sets}注`, false), 2000);

    state.ui.rolling = false;
  }, CONFIG.ROLL_TIME);
}

// ── 复制（数据驱动）────────────────────────────────────────
function copyResults() {
  if (!state.data.results.length) { setStatus('NO DATA', false); return; }

  const gameConf = GAMES[state.data.game];
  const lines = [gameConf.name];
  const [sec1, sec2] = gameConf.sections;

  // 遍历内存中的 state 数据，而不是去反查 DOM
  state.data.results.forEach((ticket, i) => {
    const s1Str = ticket[sec1.key].map(pad).join(' ');
    const s2Str = ticket[sec2.key].map(pad).join(' ');
    lines.push(`第${pad(i + 1)}注  ${s1Str}  |  ${s2Str}`);
  });

  const text = lines.join('\n');

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text)
      .then(()  => setStatus('COPIED ✓', true))
      .catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = Object.assign(document.createElement('textarea'), {
    value: text,
    style: 'position:fixed;opacity:0;top:0;left:0',
  });
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    setStatus('COPIED ✓ (fallback)', true);
  } catch {
    setStatus('COPY FAILED — 请手动复制', false);
  }
  document.body.removeChild(ta);
}

function clearResults() {
  showEmpty();
  setStatus('CLEARED', false);
}

// ── 事件绑定 ─────────────────────────────────────────────────
document.querySelector('.game-toggle').addEventListener('click', e => {
  const btn = e.target.closest('[data-game]');
  if (!btn) return;
  state.data.game = btn.dataset.game;
  document.querySelectorAll('.game-toggle [data-game]').forEach(b =>
    b.classList.toggle('active', b === btn)
  );
});

document.querySelector('.stepper').addEventListener('click', e => {
  const btn = e.target.closest('[data-delta]');
  if (!btn) return;
  state.data.sets = Math.min(CONFIG.MAX_SETS, Math.max(CONFIG.MIN_SETS, state.data.sets + Number(btn.dataset.delta)));
  els.setsVal.textContent = state.data.sets;
});

els.btnGenerate.addEventListener('click', generate);

document.querySelector('.screen-actions').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  ({ copy: copyResults, clear: clearResults })[btn.dataset.action]?.();
});

// 支持键盘快捷键触发摇号
// Enter 键触发摇号；Space 保留给浏览器默认行为（按钮点击），不额外处理
document.addEventListener('keydown', e => {
  if (e.code === 'Enter' && !state.ui.rolling) {
    e.preventDefault();
    generate();
  }
});
</script>
</body>
</html>
