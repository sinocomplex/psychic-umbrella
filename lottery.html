<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f0ede8" media="(max-width: 540px)">
<meta name="theme-color" content="#0f0f0f" media="(min-width: 541px)">
<title>摇号机 · 彩票生成器</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+SC:wght@400;500;700&family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
/* ── 设计系统：PC 暗色 / 手机 浅色 ── */
:root {
  --bg:        #0f0f0f;
  --surface:   #1a1a1a;
  --panel:     #141414;
  --border:    #2a2a2a;
  --orange:    #ff6a00;
  --orange2:   #ff9a3c;
  --green:     #3bdb6e;
  --dim:       #555;
  --text:      #e8e0d0;
  --muted:     #888;
  --mono:      'Share Tech Mono', monospace;
  --sans:      'Noto Sans SC', sans-serif;

  /* 球 - PC 暗色版 */
  --ball-size:      52px;
  --ball-font:      19px;
  --ball-weight:    700;

  /* 红球 */
  --ball-red-bg: radial-gradient(circle at 35% 32%, rgba(255,160,140,0.85), #e03020 55%, #8b0e0e);
  --ball-red-border: rgba(230,100,80,0.45);
  --ball-red-text:   #fff;
  --ball-red-glow: rgba(220,50,30,0.55) 0px 0px 16px, rgba(220,50,30,0.22) 0px 0px 36px;

  /* 蓝球 */
  --ball-blue-bg: radial-gradient(circle at 35% 32%, rgba(140,195,255,0.85), #1a6fd4 55%, #0a2e7a);
  --ball-blue-border: rgba(100,170,255,0.4);
  --ball-blue-text:   #fff;
  --ball-blue-glow: rgba(30,100,220,0.55) 0px 0px 16px, rgba(30,100,220,0.22) 0px 0px 36px;

  /* 橙球 */
  --ball-org-bg: radial-gradient(circle at 35% 32%, rgba(255,200,120,0.85), #d95f00 55%, #7a2800);
  --ball-org-border: rgba(255,150,60,0.4);
  --ball-org-text:   #fff;
  --ball-org-glow: rgba(220,100,0,0.55) 0px 0px 16px, rgba(220,100,0,0.22) 0px 0px 36px;

  /* 绿球 */
  --ball-grn-bg: radial-gradient(circle at 35% 32%, rgba(130,240,170,0.85), #1a9e4a 55%, #0a4a20);
  --ball-grn-border: rgba(80,210,120,0.4);
  --ball-grn-text:   #fff;
  --ball-grn-glow: rgba(20,160,70,0.55) 0px 0px 16px, rgba(20,160,70,0.22) 0px 0px 36px;
}

@media (max-width: 540px) {
  :root {
    --bg:        #f0ede8;
    --surface:   #ffffff;
    --panel:     #f7f5f2;
    --border:    #ddd8d0;
    --orange:    #e05800;
    --orange2:   #ff7a20;
    --green:     #1a9e4a;
    --dim:       #aaa;
    --text:      #1a1a1a;
    --muted:     #777;

    /* 手机浅色版：使用 clamp 保证极小屏幕下也能显示 */
    --ball-size:      clamp(30px, 8.5vw, 36px);
    --ball-font:      clamp(12px, 3.5vw, 14px);
    --ball-red-bg:    #d93025;
    --ball-red-text:  #fff;
    --ball-red-glow:  none;
    --ball-blue-bg:   #1a6fd4;
    --ball-blue-text: #fff;
    --ball-blue-glow: none;
    --ball-org-bg:    #d95f00;
    --ball-org-text:  #fff;
    --ball-org-glow:  none;
    --ball-grn-bg:    #1a8c3e;
    --ball-grn-text:  #fff;
    --ball-grn-glow:  none;
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px 60px;
  position: relative;
  overflow-x: hidden;
  transition: background 0.3s;
}

@media (min-width: 541px) {
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.6;
  }
  body::after {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none; z-index: 0;
  }
}

.container { position: relative; z-index: 1; width: 100%; max-width: 680px; }

/* ── header ── */
.header { text-align: center; margin-bottom: 36px; }
.header-badge {
  display: inline-block; font-family: var(--mono); font-size: 11px;
  letter-spacing: 0.25em; color: var(--orange);
  border: 1px solid var(--orange); padding: 3px 12px;
  margin-bottom: 14px; text-transform: uppercase;
}
.header h1 {
  font-family: var(--mono); font-size: clamp(26px, 6vw, 46px);
  font-weight: 400; letter-spacing: -0.02em;
  color: var(--text); line-height: 1.1;
}
.header h1 span { color: var(--orange); }
.header-sub { margin-top: 8px; font-size: 13px; color: var(--muted); letter-spacing: 0.04em; }

/* ── machine ── */
.machine {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 2px; overflow: hidden;
}

.machine-top {
  background: var(--panel); border-bottom: 1px solid var(--border);
  padding: 16px 20px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
}

@media (max-width: 540px) {
  .machine-top { padding: 14px 16px; gap: 10px; }
  .btn-generate {
    width: 100%; margin-left: 0 !important; padding: 13px 0 !important;
    font-size: 15px !important; letter-spacing: 0.2em !important; border-radius: 4px !important;
  }
}

.control-group { display: flex; align-items: center; gap: 10px; }
.ctrl-label {
  font-family: var(--mono); font-size: 11px;
  color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; white-space: nowrap;
}

.game-toggle {
  display: flex; border: 1px solid var(--border); border-radius: 2px; overflow: hidden;
}
.game-toggle button {
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em;
  padding: 7px 16px; background: transparent; color: var(--muted);
  border: none; cursor: pointer; transition: background 0.15s, color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.game-toggle button.active { background: var(--orange); color: #fff; }
.game-toggle button:not(.active):hover { background: var(--border); color: var(--text); }

@media (max-width: 540px) {
  .game-toggle button { font-size: 13px; padding: 9px 20px; }
}

.stepper {
  display: flex; align-items: center; border: 1px solid var(--border); border-radius: 2px; overflow: hidden;
}
.stepper button {
  width: 32px; height: 32px; background: var(--panel); border: none;
  color: var(--muted); font-size: 18px; line-height: 1;
  cursor: pointer; transition: color 0.15s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.stepper button:hover { color: var(--orange); background: var(--border); }
.stepper-val {
  font-family: var(--mono); font-size: 15px; color: var(--text);
  width: 38px; text-align: center; background: var(--bg);
  line-height: 32px; user-select: none;
}

@media (max-width: 540px) {
  .stepper button { width: 38px; height: 38px; font-size: 22px; }
  .stepper-val { font-size: 16px; line-height: 38px; width: 42px; }
}

.btn-generate {
  margin-left: auto; font-family: var(--mono); font-size: 13px;
  letter-spacing: 0.12em; text-transform: uppercase;
  padding: 9px 28px; background: var(--orange); color: #fff;
  border: none; border-radius: 2px; cursor: pointer;
  transition: background 0.15s, transform 0.08s;
  -webkit-tap-highlight-color: transparent;
}
.btn-generate:hover  { background: var(--orange2); }
.btn-generate:active { transform: scale(0.97); }
.btn-generate:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ── screen ── */
.machine-screen { position: relative; min-height: 220px; }

.screen-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 20px; border-bottom: 1px solid var(--border);
}
.screen-title { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.18em; text-transform: uppercase; }
.screen-actions { display: flex; gap: 8px; }
.btn-sm {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em;
  padding: 4px 12px; background: transparent; color: var(--muted);
  border: 1px solid var(--border); border-radius: 2px; cursor: pointer;
  transition: color 0.15s, border-color 0.15s; -webkit-tap-highlight-color: transparent;
}
.btn-sm:hover { color: var(--text); border-color: var(--dim); }

@media (max-width: 540px) {
  .screen-header { padding: 10px 16px; }
  .btn-sm { font-size: 12px; padding: 6px 14px; }
}

.results-list {
  padding: 16px 20px 20px; display: flex; flex-direction: column; gap: 10px;
  max-height: 600px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.results-list::-webkit-scrollbar { width: 3px; }
.results-list::-webkit-scrollbar-thumb { background: var(--border); }

@media (max-width: 540px) {
  .results-list { padding: 12px 12px 16px; gap: 6px; max-height: none; }
}

.empty-state { padding: 56px 24px; text-align: center; }
.empty-icon  { font-size: 30px; margin-bottom: 10px; opacity: 0.25; }
.empty-text  { font-family: var(--mono); font-size: 12px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; }

/* ── result row ── */
.result-row {
  display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  background: var(--panel); border: 1px solid var(--border); border-radius: 4px;
  opacity: 0; transform: translateY(5px);
  animation: rowIn 0.22s ease forwards;
}
@keyframes rowIn { to { opacity: 1; transform: translateY(0); } }

@media (max-width: 540px) {
  .result-row { flex-direction: column; align-items: flex-start; gap: 8px; padding: 12px 14px; border-radius: 6px; }
  .row-top { display: flex; align-items: center; gap: 8px; width: 100%; }
  .divider { width: 100% !important; height: 1px !important; }
}

.row-idx { font-family: var(--mono); font-size: 11px; color: var(--dim); width: 30px; flex-shrink: 0; }
@media (max-width: 540px) { .row-idx { font-size: 12px; color: var(--muted); } }

.row-section { 
  display: flex; align-items: center; gap: 8px; 
  max-width: 100%; /* 防止挤出边界 */
}
.section-tag { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; color: var(--muted); width: 22px; flex-shrink: 0; }
@media (max-width: 540px) { .section-tag { font-size: 12px; width: 24px; color: var(--muted); } }

/* 横向防溢出优化 */
.balls {
  display: flex; gap: 8px; flex-wrap: nowrap;
}
@media (max-width: 540px) {
  .balls {
    overflow-x: auto; 
    padding-bottom: 2px;
    scrollbar-width: none; /* Firefox 隐藏滚动条 */
  }
  .balls::-webkit-scrollbar { display: none; } /* Chrome 隐藏滚动条 */
}

/* ── 球 ── */
.ball {
  width: var(--ball-size); height: var(--ball-size); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Oswald', var(--mono); font-size: var(--ball-font); font-weight: var(--ball-weight, 700);
  flex-shrink: 0; cursor: default; position: relative;
  animation: ballPop 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
  transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s ease;
}
.ball:hover { transform: scale(1.12); }
@keyframes ballPop { from { transform: scale(0.35); opacity: 0; } to { transform: scale(1); opacity: 1; } }

.ball::before {
  content: ''; position: absolute; top: 14%; left: 18%; width: 38%; height: 22%;
  background: rgba(255,255,255,0.28); border-radius: 50%; filter: blur(2px); pointer-events: none;
}
.ball-red { background: var(--ball-red-bg); color: var(--ball-red-text); border: 1.5px solid var(--ball-red-border); box-shadow: var(--ball-red-glow); }
.ball-blue { background: var(--ball-blue-bg); color: var(--ball-blue-text); border: 1.5px solid var(--ball-blue-border); box-shadow: var(--ball-blue-glow); }
.ball-orange { background: var(--ball-org-bg); color: var(--ball-org-text); border: 1.5px solid var(--ball-org-border); box-shadow: var(--ball-org-glow); }
.ball-green { background: var(--ball-grn-bg); color: var(--ball-grn-text); border: 1.5px solid var(--ball-grn-border); box-shadow: var(--ball-grn-glow); }

@media (max-width: 540px) {
  .ball { font-family: var(--mono); font-weight: 700; letter-spacing: 0; transition: none; }
  .ball:hover { transform: none; }
  .ball::before { display: none; }
  .ball-red { background: var(--ball-red-bg); border: none; box-shadow: none; }
  .ball-blue { background: var(--ball-blue-bg); border: none; box-shadow: none; }
  .ball-orange { background: var(--ball-org-bg); border: none; box-shadow: none; }
  .ball-green { background: var(--ball-grn-bg); border: none; box-shadow: none; }
}

.divider { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }

/* ── status bar ── */
.statusbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 20px; border-top: 1px solid var(--border); background: var(--panel);
}
.status-text { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--dim); transition: background 0.3s; }
.status-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }

@media (max-width: 540px) { .statusbar { padding: 8px 16px; } .status-text { font-size: 12px; } }

/* ── rolling overlay ── */
.rolling-overlay {
  position: absolute; inset: 0; 
  /* 优化半透明毛玻璃背景 */
  background: color-mix(in srgb, var(--surface) 80%, transparent);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  display: none; align-items: center; justify-content: center; z-index: 10;
}
.rolling-overlay.show { display: flex; }
.roller-text {
  font-family: var(--mono); font-size: 16px; color: var(--orange);
  letter-spacing: 0.3em; text-transform: uppercase; font-weight: 700;
  animation: blink 0.5s steps(1) infinite; text-shadow: 0 2px 10px rgba(0,0,0,0.5);
}
@keyframes blink { 50% { opacity: 0; } }

/* ── footer ── */
.footer { margin-top: 24px; text-align: center; font-family: var(--mono); font-size: 11px; color: var(--dim); letter-spacing: 0.1em; }
@media (max-width: 540px) { body { padding: 28px 12px 48px; } .header { margin-bottom: 24px; } .header h1 { font-size: 32px; } }
</style>
</head>
<body>
<div class="container">
  <header class="header">
    <div class="header-badge">CRYPTO RANDOM ENGINE</div>
    <h1>摇号<span>机</span></h1>
    <p class="header-sub">基于 crypto.getRandomValues · 密码学级随机</p>
  </header>

  <div class="machine">
    <div class="machine-top">
      <div class="control-group">
        <span class="ctrl-label">玩法</span>
        <div class="game-toggle">
          <button data-game="ssq" class="active">双色球</button>
          <button data-game="dlt">大乐透</button>
        </div>
      </div>
      <div class="control-group">
        <span class="ctrl-label">注数</span>
        <div class="stepper">
          <button data-delta="-1" aria-label="减少注数">−</button>
          <div class="stepper-val">5</div>
          <button data-delta="1" aria-label="增加注数">+</button>
        </div>
      </div>
      <button class="btn-generate">▶ 摇号 (Enter)</button>
    </div>

    <div class="machine-screen">
      <div class="rolling-overlay" id="rolling">
        <span class="roller-text">ROLLING</span>
      </div>
      <div class="screen-header">
        <span class="screen-title" id="screen-title">等待摇号</span>
        <div class="screen-actions">
          <button class="btn-sm" data-action="copy">复制</button>
          <button class="btn-sm" data-action="clear">清空</button>
        </div>
      </div>
      <div class="results-list" id="results">
        <div class="empty-state">
          <div class="empty-icon">⟳</div>
          <div class="empty-text">按下摇号开始</div>
        </div>
      </div>
    </div>

    <div class="statusbar" aria-live="polite">
      <span class="status-text" id="status-text">READY</span>
      <div class="status-dot" id="status-dot"></div>
    </div>
  </div>

  <p class="footer">每注中奖概率均等 · 仅供娱乐</p>
</div>

<script>
const GAMES = {
  ssq: {
    name: '双色球',
    sections: [
      { key: 'red',   label: '红', total: 33, pick: 6, ballClass: 'ball-red'    },
      { key: 'blue',  label: '蓝', total: 16, pick: 1, ballClass: 'ball-blue'   },
    ],
  },
  dlt: {
    name: '大乐透',
    sections: [
      { key: 'front', label: '前', total: 35, pick: 5, ballClass: 'ball-orange' },
      { key: 'back',  label: '后', total: 12, pick: 2, ballClass: 'ball-green'  },
    ],
  },
};

// 状态管理：增加 currentResults 存储实际数据
const state = { 
  game: 'ssq', 
  sets: 5, 
  rolling: false, 
  currentResults: [],
};

// 内部实现细节，与业务状态分离
let rollIntervalId = null;

const MIN_SETS = 1, MAX_SETS = 20;

const els = {
  results:     document.getElementById('results'),
  statusText:  document.getElementById('status-text'),
  statusDot:   document.getElementById('status-dot'),
  screenTitle: document.getElementById('screen-title'),
  rolling:     document.getElementById('rolling'),
  setsVal:     document.querySelector('.stepper-val'),
  btnGenerate: document.querySelector('.btn-generate'),
};

// ── 随机（无模偏差）──────────────────────────────────────────
function randBelow(n) {
  const limit = Math.floor(0x100000000 / n) * n;
  const arr = new Uint32Array(1);
  let v;
  do { crypto.getRandomValues(arr); v = arr[0]; } while (v >= limit);
  return v % n;
}

function sample(total, k) {
  const pool = Array.from({ length: total }, (_, i) => i + 1);
  for (let i = total - 1; i >= total - k; i--) {
    const j = randBelow(i + 1);
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool.slice(total - k).sort((a, b) => a - b);
}

function generateTicket(gameKey) {
  const result = {};
  for (const sec of GAMES[gameKey].sections) {
    result[sec.key] = sample(sec.total, sec.pick);
  }
  return result;
}

// ── DOM 构建 ─────────────────────────────────────────────────
function pad(n) { return String(n).padStart(2, '0'); }

function makeBall(n, cls, delay, noAnim = false) {
  const el = document.createElement('span');
  el.className = `ball ${cls}`;
  el.textContent = pad(n);
  if (!noAnim) el.style.animationDelay = delay + 'ms';
  return el;
}

const isMobile = () => window.innerWidth <= 540;

function makeRow(index, ticket, gameKey, noAnim = false) {
  const row = document.createElement('div');
  row.className = 'result-row';
  if (!noAnim) row.style.animationDelay = (index * 55) + 'ms';
  
  const mobile = isMobile();

  if (mobile) {
    const top = document.createElement('div');
    top.className = 'row-top';
    const idx = document.createElement('span');
    idx.className = 'row-idx';
    idx.textContent = `#${pad(index + 1)}`;
    top.appendChild(idx);
    row.appendChild(top);
  } else {
    const idx = document.createElement('span');
    idx.className = 'row-idx';
    idx.textContent = pad(index + 1);
    row.appendChild(idx);
  }

  let ballOffset = 0;
  GAMES[gameKey].sections.forEach((sec, si) => {
    if (si > 0) {
      const div = document.createElement('div');
      div.className = 'divider';
      row.appendChild(div);
    }
    const wrap = document.createElement('div');
    wrap.className = 'row-section';

    const tag = document.createElement('span');
    tag.className = 'section-tag';
    tag.textContent = sec.label;
    wrap.appendChild(tag);

    const ballsWrap = document.createElement('div');
    ballsWrap.className = 'balls';
    ticket[sec.key].forEach((n, bi) => {
      ballsWrap.appendChild(makeBall(n, sec.ballClass, (ballOffset + bi) * 38, noAnim));
    });
    ballOffset += ticket[sec.key].length;
    wrap.appendChild(ballsWrap);
    row.appendChild(wrap);
  });
  return row;
}

// ── UI 辅助 ───────────────────────────────────────────────────
function setStatus(msg, active = false) {
  els.statusText.textContent = msg;
  els.statusDot.classList.toggle('active', active);
}

function showEmpty() {
  els.results.innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">⟳</div>
      <div class="empty-text">按下摇号开始</div>
    </div>`;
  els.screenTitle.textContent = '等待摇号';
  state.currentResults = []; // 清空状态
}

function renderResults(gameKey, resultsData, noAnim = false) {
  els.results.innerHTML = '';
  const frag = document.createDocumentFragment();
  resultsData.forEach((ticket, i) => {
    frag.appendChild(makeRow(i, ticket, gameKey, noAnim));
  });
  els.results.appendChild(frag);
  els.results.scrollTop = 0;
  els.screenTitle.textContent = `${GAMES[gameKey].name} · ${resultsData.length} 注`;
}

// 摇号占位动画特效
function startRollingEffect() {
  els.rolling.classList.add('show');
  els.btnGenerate.disabled = true;
  setStatus('ROLLING...', true);

  // 1. 先生成一次假数据渲染出来（关闭动画）
  const fakeData = Array.from({ length: state.sets }, () => generateTicket(state.game));
  renderResults(state.game, fakeData, true);
  
  // 2. 让 DOM 里的数字开始快速跳动
  const balls = els.results.querySelectorAll('.ball');
  rollIntervalId = setInterval(() => {
    balls.forEach(b => {
      b.textContent = pad(Math.floor(Math.random() * 35) + 1);
    });
  }, 40);
}

function stopRollingEffect() {
  clearInterval(rollIntervalId);
  rollIntervalId = null;
  els.rolling.classList.remove('show');
  els.btnGenerate.disabled = false;
}

function finishGeneration() {
  const { game, sets } = state;
  // 核心：将生成的最终数据存入状态管理
  state.currentResults = Array.from({ length: sets }, () => generateTicket(game));
  
  // 根据状态渲染（开启进场动画）
  renderResults(game, state.currentResults);
  
  setStatus(`OK · ${sets} SETS · ${GAMES[game].name}`, true);
  setTimeout(() => setStatus(`READY · LAST: ${GAMES[game].name} ${sets}注`, false), 2000);
}

function generate() {
  if (state.rolling) return;
  state.rolling = true;
  startRollingEffect();
  
  setTimeout(() => {
    stopRollingEffect();
    finishGeneration();
    state.rolling = false;
  }, 650);
}

// ── 复制（数据驱动）────────────────────────────────────────
function copyResults() {
  if (!state.currentResults.length) { setStatus('NO DATA', false); return; }

  const gameConf = GAMES[state.game];
  const lines = [gameConf.name];
  const [sec1, sec2] = gameConf.sections;

  // 遍历内存中的 state 数据，而不是去反查 DOM
  state.currentResults.forEach((ticket, i) => {
    const s1Str = ticket[sec1.key].map(pad).join(' ');
    const s2Str = ticket[sec2.key].map(pad).join(' ');
    lines.push(`第${pad(i + 1)}注  ${s1Str}  |  ${s2Str}`);
  });

  const text = lines.join('\n');

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text)
      .then(()  => setStatus('COPIED ✓', true))
      .catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = Object.assign(document.createElement('textarea'), {
    value: text,
    style: 'position:fixed;opacity:0;top:0;left:0',
  });
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    setStatus('COPIED ✓ (fallback)', true);
  } catch {
    setStatus('COPY FAILED — 请手动复制', false);
  }
  document.body.removeChild(ta);
}

function clearResults() {
  showEmpty();
  setStatus('CLEARED', false);
}

// ── 事件绑定 ─────────────────────────────────────────────────
document.querySelector('.game-toggle').addEventListener('click', e => {
  const btn = e.target.closest('[data-game]');
  if (!btn) return;
  state.game = btn.dataset.game;
  document.querySelectorAll('.game-toggle [data-game]').forEach(b =>
    b.classList.toggle('active', b === btn)
  );
});

document.querySelector('.stepper').addEventListener('click', e => {
  const btn = e.target.closest('[data-delta]');
  if (!btn) return;
  state.sets = Math.min(MAX_SETS, Math.max(MIN_SETS, state.sets + Number(btn.dataset.delta)));
  els.setsVal.textContent = state.sets;
});

els.btnGenerate.addEventListener('click', generate);

document.querySelector('.screen-actions').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  ({ copy: copyResults, clear: clearResults })[btn.dataset.action]?.();
});

// 支持键盘快捷键触发摇号
// Enter 键触发摇号；Space 保留给浏览器默认行为（按钮点击），不额外处理
document.addEventListener('keydown', e => {
  if (e.code === 'Enter' && !state.rolling) {
    e.preventDefault();
    generate();
  }
});
</script>
</body>
</html>
